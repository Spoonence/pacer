<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pacer</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pacer">

    <style>
        :root { --bg: #0a0a0a; --gold: #FFD700; --blue: #007AFF; --green: #00FF88; --red: #FF3B30; --card: #1a1a1a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 40px 20px 20px 20px; box-sizing: border-box; overflow-x: hidden; }
        .header { width: 100%; max-width: 340px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #last-start { font-size: 0.75rem; color: #555; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #timer { font-size: 5.5rem; font-weight: 800; margin: 10px 0 25px 0; font-variant-numeric: tabular-nums; }
        .btn-stack { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 22px; border: none; border-radius: 18px; font-size: 1.2rem; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        #beer-btn { background: var(--gold); color: #000; }
        #beer-btn:disabled { background: #222; color: #555; }
        #water-btn { background: var(--blue); color: white; }
        #water-btn:disabled { background: #1a1a1a; color: #444; opacity: 0.5; }
        
        .log-container { width: 100%; max-width: 340px; background: var(--card); border-radius: 18px; padding: 15px; margin-top: 25px; }
        .log-header { font-size: 0.8rem; color: #666; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.95rem; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .chart-wrapper { position: relative; width: 100%; max-width: 320px; height: 220px; margin-top: 30px; }
        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; width: 100%; height: 200px; border-bottom: 2px solid #333; position: relative; z-index: 2; }
        .target-line { position: absolute; left: 0; right: 0; border-top: 2px dashed rgba(0, 122, 255, 0.6); z-index: 1; pointer-events: none; }
        .target-label { position: absolute; right: -5px; color: var(--blue); font-size: 0.6rem; font-weight: bold; transform: translateY(-100%); text-transform: uppercase; }
        
        .chart-bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; position: relative; z-index: 3; }
        .bar-value { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        .bar { width: 30px; background: linear-gradient(to top, var(--gold), #fff59d); border-radius: 4px 4px 0 0; transition: height 0.5s ease-out; }
        .bar-label { font-size: 0.65rem; color: #666; margin-top: 10px; text-align: center; width: 60px; transform: rotate(-45deg); height: 40px; }

        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 70px; text-align: center; font-size: 1.3rem; margin: 10px 0; }
        .secondary-btn { background: #333; color: white; padding: 10px 20px; border-radius: 10px; margin: 5px; font-size: 0.8rem; border: none; font-weight: bold; }
        .danger-link { color: var(--red); font-size: 0.8rem; margin-top: 25px; cursor: pointer; text-decoration: underline; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <span onclick="toggleOverlay('settings-panel')" style="font-size: 1.4rem; cursor:pointer; padding: 10px;">⚙️</span>
        <span id="status" style="color:#888; font-weight:bold; letter-spacing: 2px;">PACER</span>
        <span onclick="toggleOverlay('history-panel')" style="font-size: 1.4rem; cursor:pointer; padding: 10px;">📊</span>
        <span onclick="finishNight()" style="color:var(--red); font-weight:bold; cursor:pointer; padding: 10px;">FINISH</span>
    </div>

    <div id="last-start">--:--</div>
    <div id="timer">READY</div>

    <div class="btn-stack">
        <button id="beer-btn" class="btn" onclick="buyBeer()">BUY BEER</button>
        <button id="water-btn" class="btn" onclick="drinkWater()">DRINK WATER</button>
    </div>

    <div class="log-container">
        <div class="log-header"><span>Session Log</span><span id="beer-count">0 Beers</span></div>
        <ul id="history-list"></ul>
    </div>

    <div id="history-panel" class="overlay">
        <h2 style="margin-bottom: 5px;">Pacing Trends</h2>
        <p style="color: #666; font-size: 0.8rem;">Target (Blue Line): <span id="target-stat">70</span>m</p>
        <div class="chart-wrapper">
            <div id="chart-target-line" class="target-line"><span class="target-label">Goal</span></div>
            <div class="chart-container" id="chart-display"></div>
        </div>
        <div onclick="toggleOverlay('history-panel')" style="margin-top:80px; color:var(--gold); font-weight:bold; cursor:pointer; font-size: 1.1rem; border: 1px solid var(--gold); padding: 12px 30px; border-radius: 12px;">CLOSE</div>
    </div>

    <div id="settings-panel" class="overlay">
        <h2 style="margin-bottom: 20px;">Settings</h2>
        <div style="text-align: center;">
            <p style="color:#888; margin: 5px 0;">Wait Time (mins)</p>
            <input type="number" id="set-wait" value="70">
            <p style="color:#888; margin: 20px 0 5px 0;">Water Bonus (mins)</p>
            <input type="number" id="set-bonus" value="10">
        </div>
        <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; text-align:center; width: 100%; max-width: 300px;">
            <button class="secondary-btn" onclick="exportData()">EXPORT</button>
            <button class="secondary-btn" onclick="importData()">IMPORT</button>
            <div class="danger-link" onclick="clearCurrentLog()">Wipe Current Session Log</div>
        </div>
        <div onclick="saveSettings()" style="margin-top:40px; color:var(--blue); font-weight:bold; cursor:pointer; font-size: 1.3rem; border: 2px solid var(--blue); padding: 15px 40px; border-radius: 12px;">SAVE & CLOSE</div>
    </div>

    <script>
        let waitTime = parseInt(localStorage.getItem('waitTime')) || 70;
        let bonusTime = parseInt(localStorage.getItem('bonusTime')) || 10;
        let nextBeerTime = parseInt(localStorage.getItem('nextBeerTime')) || 0;
        let waterUsed = localStorage.getItem('waterUsed') === 'true';
        let history = JSON.parse(localStorage.getItem('beerHistory')) || [];
        let datedPaces = JSON.parse(localStorage.getItem('datedPaces')) || [];
        let alarmFired = false;
        let wakeLock = null;

        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        const acquireWakeLock = async () => {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        };

        function playAlarm() {
            if (navigator.vibrate) navigator.vibrate([400, 100, 200, 100, 400]);
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.connect(gain); gain.connect(context.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, context.currentTime); 
                gain.gain.setValueAtTime(0, context.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, context.currentTime + 0.1);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 1.5);
                osc.stop(context.currentTime + 1.6);
            } catch(e) {}
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("PACER", { body: "Time's up!", tag: "pacer-alert" });
            }
        }

        function updateUI() {
            const now = Date.now();
            const diff = nextBeerTime - now;
            const timerEl = document.getElementById('timer');
            const startEl = document.getElementById('last-start');
            startEl.innerText = history.length > 0 ? `Last Purchase: ${history[0].time}` : "No session active";

            if (diff <= 0) {
                timerEl.innerText = "READY";
                timerEl.style.color = "var(--green)";
                document.getElementById('beer-btn').disabled = false;
                document.getElementById('water-btn').disabled = true;
                if (!alarmFired && nextBeerTime !== 0) { playAlarm(); alarmFired = true; }
            } else {
                alarmFired = false;
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                timerEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                timerEl.style.color = "var(--red)";
                document.getElementById('beer-btn').disabled = true;
                document.getElementById('water-btn').disabled = waterUsed;
            }
            document.getElementById('beer-count').innerText = `${history.length} Beer${history.length === 1 ? '' : 's'}`;
            document.getElementById('history-list').innerHTML = history.slice(0, 5).map(e => `
                <li><span>${e.time}</span> ${e.water ? '<span style="color:var(--blue)">💧 Water</span>' : ''}</li>
            `).join('');
            renderChart();
        }

        function renderChart() {
            const chart = document.getElementById('chart-display');
            const targetLine = document.getElementById('chart-target-line');
            document.getElementById('target-stat').innerText = waitTime;
            if (datedPaces.length === 0) {
                chart.innerHTML = '<p style="color:#444; width:100%; text-align:center;">No history yet</p>';
                targetLine.style.display = 'none'; return;
            }
            targetLine.style.display = 'block';
            const allValues = datedPaces.map(d => d.pace);
            const maxVal = Math.max(...allValues, waitTime + 10, 80);
            const targetPos = (waitTime / maxVal) * 100;
            targetLine.style.bottom = `${targetPos}%`;
            const displayData = [...datedPaces].reverse().slice(-5);
            chart.innerHTML = displayData.map(d => {
                const height = (d.pace / maxVal) * 100;
                return `<div class="chart-bar-wrapper"><span class="bar-value">${d.pace}m</span><div class="bar" style="height: ${height}%"></div><span class="bar-label">${d.date.split(',')[0]}</span></div>`;
            }).join('');
        }

        function buyBeer() {
            acquireWakeLock();
            const now = Date.now();
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            history.unshift({ timestamp: now, time: timeStr, water: false });
            nextBeerTime = now + (waitTime * 60000);
            waterUsed = false; save(); updateUI();
        }

        function drinkWater() {
            if (!waterUsed && nextBeerTime > Date.now()) {
                nextBeerTime -= (bonusTime * 60000);
                waterUsed = true; if (history[0]) history[0].water = true;
                save(); updateUI();
            }
        }

        function finishNight() {
            if (history.length < 2) { alert("Session closed."); resetSession(); return; }
            const totalDurationMs = history[0].timestamp - history[history.length - 1].timestamp;
            const currentAvg = Math.round((totalDurationMs / (history.length - 1)) / 60000);
            const d = new Date();
            datedPaces.unshift({ date: `${d.getDate()} ${d.toLocaleDateString([], { month: 'short' })}`, pace: currentAvg });
            if (datedPaces.length > 5) datedPaces.pop();
            alert(`FINISH\nAvg Pace: ${currentAvg}m\nGoal: ${waitTime}m`);
            resetSession();
        }

        function resetSession() {
            history = []; nextBeerTime = 0; waterUsed = false; alarmFired = false;
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            save(); updateUI();
        }

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            waitTime = parseInt(document.getElementById('set-wait').value);
            bonusTime = parseInt(document.getElementById('set-bonus').value);
            localStorage.setItem('waitTime', waitTime);
            localStorage.setItem('bonusTime', bonusTime);
            toggleOverlay('settings-panel');
        }

        function exportData() {
            const b64 = btoa(JSON.stringify({ waitTime, bonusTime, datedPaces }));
            navigator.clipboard.writeText(b64).then(() => alert("Data copied!"));
        }

        function importData() {
            const code = prompt("Paste code:");
            if (code) {
                try {
                    const data = JSON.parse(atob(code));
                    datedPaces = data.datedPaces || [];
                    waitTime = data.waitTime || 70;
                    bonusTime = data.bonusTime || 10;
                    save(); location.reload();
                } catch(e) { alert("Invalid."); }
            }
        }

        function clearCurrentLog() { if (confirm("Reset current session?")) { resetSession(); toggleOverlay('settings-panel'); } }

        function save() {
            localStorage.setItem('nextBeerTime', nextBeerTime);
            localStorage.setItem('waterUsed', waterUsed);
            localStorage.setItem('beerHistory', JSON.stringify(history));
            localStorage.setItem('datedPaces', JSON.stringify(datedPaces));
        }

        setInterval(updateUI, 1000);
        updateUI();

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') acquireWakeLock();
        });
    </script>
</body>
</html>
