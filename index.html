    <style>
        :root { --bg: #0a0a0a; --gold: #FFD700; --blue: #007AFF; --green: #00FF88; --red: #FF3B30; --card: #1a1a1a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 40px 20px 20px 20px; box-sizing: border-box; }
        .header { width: 100%; max-width: 340px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #last-start { font-size: 0.75rem; color: #555; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #timer { font-size: 5.5rem; font-weight: 800; margin: 10px 0 25px 0; font-variant-numeric: tabular-nums; }
        .btn-stack { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 22px; border: none; border-radius: 18px; font-size: 1.2rem; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #beer-btn { background: var(--gold); color: #000; }
        #beer-btn:disabled { background: #222; color: #555; }
        #water-btn { background: var(--blue); color: white; }
        #water-btn:disabled { background: #1a1a1a; color: #444; opacity: 0.5; }
        .log-container { width: 100%; max-width: 340px; background: var(--card); border-radius: 18px; padding: 15px; margin-top: 25px; }
        .log-header { font-size: 0.8rem; color: #666; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.95rem; }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 70px; text-align: center; font-size: 1.3rem; margin: 10px 0; }
        .secondary-btn { background: #333; color: white; padding: 10px 20px; border-radius: 10px; margin: 5px; font-size: 0.8rem; border: none; font-weight: bold; }
        .danger-link { color: var(--red); font-size: 0.8rem; margin-top: 25px; cursor: pointer; text-decoration: underline; opacity: 0.7; }
        
        table { width: 100%; max-width: 280px; border-collapse: collapse; margin-top: 20px; }
        th { color: #666; font-size: 0.7rem; text-transform: uppercase; text-align: left; padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid #222; font-size: 1.1rem; }
        .baseline-val { font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <span onclick="toggleOverlay('settings-panel')" style="font-size: 1.4rem; cursor:pointer; padding: 10px;">⚙️</span>
        <span id="status" style="color:#888; font-weight:bold; letter-spacing: 2px;">PACER</span>
        <span onclick="toggleOverlay('history-panel')" style="font-size: 1.4rem; cursor:pointer; padding: 10px;">📊</span>
        <span onclick="finishNight()" style="color:var(--red); font-weight:bold; cursor:pointer; padding: 10px;">FINISH</span>
    </div>

    <div id="last-start">--:--</div>
    <div id="timer">READY</div>

    <div class="btn-stack">
        <button id="beer-btn" class="btn" onclick="buyBeer()">BUY BEER</button>
        <button id="water-btn" class="btn" onclick="drinkWater()">DRINK WATER</button>
    </div>

    <div class="log-container">
        <div class="log-header"><span>Session Log</span><span id="beer-count">0 Beers</span></div>
        <ul id="history-list"></ul>
    </div>

    <div id="history-panel" class="overlay">
        <h2 style="margin-bottom: 10px;">Baseline History</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Last 5 Sessions (mins/beer)</p>
        <table>
            <thead>
                <tr><th>Session</th><th>Avg Pace</th></tr>
            </thead>
            <tbody id="baseline-table-body">
                </tbody>
        </table>
        <div onclick="toggleOverlay('history-panel')" style="margin-top:40px; color:var(--gold); font-weight:bold; cursor:pointer; font-size: 1.1rem; border: 1px solid var(--gold); padding: 12px 30px; border-radius: 12px;">CLOSE</div>
    </div>

    <div id="settings-panel" class="overlay">
        <h2 style="margin-bottom: 20px;">Settings</h2>
        <div style="text-align: center;">
            <p style="color:#888; margin: 5px 0;">Wait Time (mins)</p>
            <input type="number" id="set-wait" value="70">
            <p style="color:#888; margin: 20px 0 5px 0;">Water Bonus (mins)</p>
            <input type="number" id="set-bonus" value="10">
        </div>
        
        <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; text-align:center; width: 100%; max-width: 300px;">
            <p style="color:#666; font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 1px;">DATA MANAGEMENT</p>
            <button class="secondary-btn" onclick="exportData()">EXPORT</button>
            <button class="secondary-btn" onclick="importData()">IMPORT</button>
            <br>
            <div class="danger-link" onclick="clearCurrentLog()">Wipe Current Session Log</div>
        </div>

        <div onclick="saveSettings()" style="margin-top:40px; color:var(--blue); font-weight:bold; cursor:pointer; font-size: 1.3rem; border: 2px solid var(--blue); padding: 15px 40px; border-radius: 12px;">SAVE & CLOSE</div>
    </div>
